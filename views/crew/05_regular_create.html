<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPORTMATCH — 생활 스포츠 매칭 플랫폼</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#F7F8F5;
  --surface:#FFFFFF;
  --border:#E6E8E2;
  --border-strong:#C8CAC4;
  --text:#111110;
  --text-2:#555552;
  --text-3:#999994;
  --accent:#C8FF00;
  --accent-dark:#8FB800;
  --primary:#1A5CFF;
  --primary-soft:#EEF3FF;
  --primary-deep:#0040CC;
  --cyan:#00C8D4;
  --red:#FF3B30;
  --green:#00C853;
  --orange:#FF6B00;
  --nav-w:228px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg:0 2px 8px rgba(0,0,0,0.08),0 12px 40px rgba(0,0,0,0.08);
  --radius:14px;
  --radius-sm:8px;
  --radius-lg:22px;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;overflow-x:hidden}

/* ─── SIDEBAR ─── */
.sidenav{
  width:var(--nav-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);
  height:100vh;position:sticky;top:0;
  display:flex;flex-direction:column;
  z-index:200;
}
.sidenav-logo{
  padding:26px 22px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:3px;color:var(--text);
}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:2px;}
.logo-sub{font-size:10px;color:var(--text-3);letter-spacing:.5px;margin-top:1px}

.sidenav-menu{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section-label{
  font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-3);padding:0 12px;margin:18px 0 5px;
}
.nav-section-label:first-child{margin-top:4px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:500;color:var(--text-2);
  cursor:pointer;transition:all .15s;
  border:none;background:none;width:100%;text-align:left;position:relative;
}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--text);color:var(--bg)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--accent);color:var(--text);
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  font-family:'DM Mono',monospace;
}
.nav-live{
  margin-left:auto;width:7px;height:7px;border-radius:50%;
  background:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.2);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(0,200,83,.2)}50%{box-shadow:0 0 0 5px rgba(0,200,83,.1)}}

.sidenav-footer{padding:14px;border-top:1px solid var(--border)}
.user-chip{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;
}
.user-chip:hover{background:var(--bg)}
.user-av{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#1A5CFF,#00C8D4);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;
}
.user-name{font-size:13px;font-weight:600;flex:1}
.user-level{font-size:10.5px;color:var(--text-3)}

/* ─── MAIN ─── */
.main{flex:1;min-height:100vh;overflow-y:auto;display:flex;flex-direction:column}

/* ─── PAGES ─── */
.page{display:none;flex:1;animation:pageIn .2s ease}
.page.active{display:flex;flex-direction:column}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ─── TOPBAR ─── */
.topbar{
  padding:18px 28px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:100;
}
.topbar-title{font-size:14.5px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--text-3);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:9px 18px;border-radius:var(--radius-sm);
  font-size:13.5px;font-weight:600;cursor:pointer;
  border:1px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{background:#222220}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border)}
.btn-outline:hover{border-color:var(--border-strong)}
.btn-accent{background:var(--accent);color:var(--text);border-color:var(--accent)}
.btn-accent:hover{background:#b5e800}
.btn-ghost{background:transparent;color:var(--text-2);border-color:transparent;padding:9px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:13px 26px;font-size:15px;border-radius:var(--radius)}
.btn-full{width:100%}
.flex-1{flex:1}

/* ─── PAGE LAYOUT ─── */
.page-body{padding:28px;flex:1}
.page-body-wide{padding:0;flex:1;display:flex;flex-direction:column}

/* ─── SECTION LABELS ─── */
.section-title{
  font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-3);margin-bottom:14px;
}
.page-heading{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:3px}
.page-subheading{font-size:13px;color:var(--text-3);margin-bottom:24px}

/* ─── CARDS ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-hover{cursor:pointer;transition:all .15s}
.card-hover:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}

/* ─── STAT CARDS ─── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-block-val{font-size:30px;font-weight:700;letter-spacing:-1px;margin-bottom:3px;font-family:'DM Mono',monospace}
.stat-block-label{font-size:11.5px;color:var(--text-3);font-weight:500}
.stat-block-change{font-size:11px;font-weight:700;margin-top:7px;font-family:'DM Mono',monospace}
.stat-block-change.up{color:var(--green)}
.stat-block-change.down{color:var(--red)}

/* ─── TAGS / BADGES ─── */
.tag{
  display:inline-flex;align-items:center;
  padding:3px 8px;border-radius:4px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  font-family:'DM Mono',monospace;
}
.tag-outline{border:1px solid var(--border);color:var(--text-2)}
.tag-filled{background:var(--text);color:var(--bg)}
.tag-accent{background:var(--accent);color:var(--text)}
.tag-green{background:#E8FAF0;color:#007A33}
.tag-red{background:#FFF0EE;color:#CC2900}
.tag-orange{background:#FFF4EC;color:#CC4500}
.tag-blue{background:#EEF3FF;color:#003DB3}

/* ─── STATUS PILLS ─── */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pill-open{background:#E8FAF0;color:#007A33}.pill-open::before{background:#00C853}
.pill-warn{background:#FFF4EC;color:#CC4500}.pill-warn::before{background:#FF6B00}
.pill-full{background:#FFF0EE;color:#CC2900}.pill-full::before{background:#FF3B30}

/* ─── FORMS ─── */
.field{margin-bottom:16px}
.label{font-size:12px;font-weight:600;color:var(--text-2);display:block;margin-bottom:5px;letter-spacing:.3px}
.input{
  width:100%;padding:9px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);
  background:var(--surface);transition:border-color .15s;outline:none;
}
.input:focus{border-color:var(--text)}
.input::placeholder{color:var(--text-3)}
textarea.input{resize:vertical;min-height:90px}
select.input{cursor:pointer}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ─── CHIP SELECTS ─── */
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:5px 13px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-2);
}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip.accent.on{background:var(--accent);color:var(--text);border-color:var(--accent)}

/* ─── DIVIDERS ─── */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ─── UTILS ─── */
.flex{display:flex}.flex-col{flex-direction:column}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-16{gap:16px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-muted{color:var(--text-3)}
.font-mono{font-family:'DM Mono',monospace}
.fw-700{font-weight:700}.fw-600{font-weight:600}

/* ═══════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════ */
.home-hero{
  background:linear-gradient(135deg,#0f1520 0%,#1A5CFF 55%,#00C8D4 100%);
  padding:36px 28px 32px;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 70% 50%,rgba(200,255,0,.12),transparent 50%);
}
.home-hero-inner{position:relative;z-index:1}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;
  color:rgba(255,255,255,.9);letter-spacing:.5px;margin-bottom:14px;
}
.hero-live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.hero-title{
  font-size:clamp(28px,4vw,48px);font-weight:700;color:#fff;
  letter-spacing:-1px;line-height:1.1;margin-bottom:10px;
}
.hero-title span{color:var(--accent)}
.hero-subtitle{font-size:14px;color:rgba(255,255,255,.72);line-height:1.7;margin-bottom:22px;max-width:460px}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  margin-top:24px;padding-top:22px;border-top:1px solid rgba(255,255,255,.14);
}
.hero-stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:#fff;letter-spacing:-1px}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}

/* QUICK SEARCH */
.quick-search{
  display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin:20px 28px;
  box-shadow:var(--shadow);
}
.qs-field{padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg)}
.qs-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.qs-val{font-size:13.5px;font-weight:600}

/* SPORT CHIPS ROW */
.sport-chips{
  display:flex;gap:8px;padding:0 28px 4px;overflow-x:auto;
  scrollbar-width:none;
}
.sport-chips::-webkit-scrollbar{display:none}
.sport-chip{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  font-size:12.5px;font-weight:500;cursor:pointer;
  transition:all .15s;white-space:nowrap;color:var(--text-2);
  flex-shrink:0;
}
.sport-chip:hover{border-color:var(--border-strong);color:var(--text)}
.sport-chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.sport-chip .emoji{font-size:15px}

/* MATCH CARDS GRID */
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.match-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;
}
.match-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow);transform:translateY(-2px)}
.mc-thumb{
  height:100px;display:flex;align-items:center;justify-content:center;
  font-size:44px;position:relative;
  background:linear-gradient(135deg,rgba(26,92,255,.1),rgba(0,200,212,.1));
}
.mc-status-badge{
  position:absolute;top:10px;right:10px;
}
.mc-body{padding:14px}
.mc-title{font-size:13.5px;font-weight:700;margin-bottom:5px;line-height:1.3}
.mc-meta{display:flex;gap:10px;font-size:11.5px;color:var(--text-3);flex-wrap:wrap;margin-bottom:10px}
.mc-meta span{display:flex;align-items:center;gap:4px}
.mc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--border);
}
.mc-host{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2)}
.mc-host-av{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#1A5CFF,#00C8D4);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
}
.mc-price{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--primary)}

/* LIVE FEED */
.live-feed{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.live-feed-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.live-feed-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.feed-item{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--border);font-size:12.5px;
  animation:feedIn .3s ease;
}
@keyframes feedIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.feed-item:last-child{border-bottom:none}
.feed-emoji{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.feed-time{font-size:10.5px;color:var(--text-3);font-family:'DM Mono',monospace;margin-left:auto;flex-shrink:0}

/* ═══════════════════════════════════════
   MAP PAGE
═══════════════════════════════════════ */
.map-container{display:grid;grid-template-columns:1fr 340px;flex:1;min-height:0}
.map-area{position:relative;background:#EEF0EC;overflow:hidden}
.map-grid{
  position:absolute;inset:0;
  background:
    linear-gradient(rgba(180,185,175,.35) 1px,transparent 1px),
    linear-gradient(90deg,rgba(180,185,175,.35) 1px,transparent 1px),
    #EEF0EC;
  background-size:30px 30px,30px 30px,100% 100%;
}
.map-road-h{position:absolute;left:0;right:0;background:#D5D7CE}
.map-road-v{position:absolute;top:0;bottom:0;background:#D5D7CE}
.map-road-main{background:#C4C6BC!important}
.map-marker{position:absolute;transform:translate(-50%,-100%);cursor:pointer;transition:transform .15s}
.map-marker:hover{transform:translate(-50%,-100%) scale(1.12)}
.marker-pin{
  width:38px;height:38px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.18);border:2px solid rgba(255,255,255,.65);
}
.marker-emoji{transform:rotate(45deg);font-size:17px}
.marker-label{
  position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;
  white-space:nowrap;font-family:'DM Mono',monospace;letter-spacing:.4px;
}
.map-me{
  position:absolute;width:14px;height:14px;
  background:var(--accent);border-radius:50%;
  border:2px solid var(--text);
  box-shadow:0 0 0 8px rgba(200,255,0,.18);
}
.map-controls{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:4px}
.map-ctrl-btn{
  width:36px;height:36px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;color:var(--text-2);box-shadow:var(--shadow);transition:all .15s;
}
.map-ctrl-btn:hover{color:var(--text);border-color:var(--border-strong)}
.map-filter-bar{
  position:absolute;top:14px;left:14px;right:62px;
  display:flex;gap:6px;flex-wrap:wrap;
}
.map-filter-chip{
  padding:6px 12px;border-radius:20px;background:var(--surface);
  border:1px solid var(--border);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;color:var(--text-2);
  box-shadow:var(--shadow);white-space:nowrap;
}
.map-filter-chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ─── REGULAR FILTER CHIPS (topbar용) ─── */
.reg-filter-chip{
  padding:5px 11px;border-radius:20px;background:transparent;
  border:1px solid var(--border);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;color:var(--text-3);
  white-space:nowrap;font-family:'DM Sans',sans-serif;
}
.reg-filter-chip:hover{border-color:var(--border-strong);color:var(--text)}
.reg-filter-chip.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.map-fab{
  position:absolute;bottom:18px;right:18px;
  width:44px;height:44px;border-radius:50%;
  background:var(--text);color:var(--bg);
  border:none;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-lg);transition:all .2s;
}
.map-fab:hover{background:#222;transform:scale(1.06)}

.map-list{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface)}
.map-list-header{padding:14px 18px;border-bottom:1px solid var(--border)}
.map-list-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:8px}
.map-sort-tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg)}
.map-sort-tab{flex:1;padding:6px 8px;font-size:11.5px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;color:var(--text-3);border:none;background:transparent}
.map-sort-tab.on{background:var(--text);color:var(--bg)}
.map-list-items{flex:1;overflow-y:auto}
.map-item{padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.map-item:hover{background:var(--bg)}
.map-item.sel{background:var(--bg);border-left:2px solid var(--accent)}
.mi-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
.mi-sport{width:34px;height:34px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid var(--border)}
.mi-title{font-size:13px;font-weight:600;line-height:1.3;flex:1}
.mi-meta{display:flex;gap:8px;font-size:11px;color:var(--text-3);flex-wrap:wrap}
.mi-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:7px}

/* ═══════════════════════════════════════
   REGULAR MEETINGS PAGE
═══════════════════════════════════════ */
.regular-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.reg-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;
}
.reg-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow);transform:translateY(-1px)}
.reg-card-head{
  padding:18px;background:linear-gradient(135deg,rgba(26,92,255,.08),rgba(0,200,212,.06));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.reg-sport-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--surface);border:1px solid var(--border);
}
.reg-card-title{font-size:14px;font-weight:700;margin-bottom:3px}
.reg-card-sub{font-size:12px;color:var(--text-3)}
.reg-card-body{padding:14px 18px}
.reg-meta-row{display:flex;gap:16px;margin-bottom:12px;font-size:12px;color:var(--text-2)}
.reg-meta-row span{display:flex;align-items:center;gap:5px}
.reg-members{display:flex;align-items:center;gap:-4px;margin-bottom:10px}
.reg-member-av{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  border:2px solid var(--surface);margin-left:-6px;
}
.reg-member-av:first-child{margin-left:0}
.reg-member-more{background:var(--bg);color:var(--text-3);border:1px solid var(--border);font-size:10px;font-weight:600}
.reg-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.reg-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--cyan));border-radius:2px}
.reg-progress-label{font-size:10.5px;color:var(--text-3);display:flex;justify-content:space-between}

/* ═══════════════════════════════════════
   TRADE (MARKETPLACE) PAGE
═══════════════════════════════════════ */
.trade-layout{display:grid;grid-template-columns:240px 1fr;flex:1;min-height:0}
.trade-filter{border-right:1px solid var(--border);padding:20px;overflow-y:auto;background:var(--surface)}
.trade-filter .section-title{margin-bottom:10px}
.filter-section{margin-bottom:18px}
.filter-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.filter-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;font-size:13px;color:var(--text-2);
}
.filter-item:hover{background:var(--bg);color:var(--text)}
.filter-item.active{background:var(--bg);color:var(--text);font-weight:600}
.trade-main{padding:22px;overflow-y:auto}
.trade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.trade-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .18s;
}
.trade-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow);transform:translateY(-2px)}
.trade-thumb{
  height:130px;display:flex;align-items:center;justify-content:center;
  font-size:48px;background:var(--bg);position:relative;
}
.trade-condition{
  position:absolute;top:8px;left:8px;
}
.trade-body{padding:12px}
.trade-title{font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.35}
.trade-price{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;margin-bottom:6px}
.trade-meta{font-size:11px;color:var(--text-3);display:flex;gap:8px}

/* ═══════════════════════════════════════
   NOTIFICATIONS PAGE
═══════════════════════════════════════ */
.notif-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .15s;position:relative;
}
.notif-item:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
.notif-item.unread{background:#FAFFFE;border-color:#C8FFD4}
.notif-icon{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13.5px;line-height:1.5;margin-bottom:4px;color:var(--text)}
.notif-meta{font-size:12px;color:var(--text-3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-time{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace}
.notif-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  flex-shrink:0;margin-top:4px;
}
.notif-date-divider{
  font-size:11px;font-weight:700;color:var(--text-3);
  text-transform:uppercase;letter-spacing:1px;
  padding:8px 4px 4px;font-family:'DM Mono',monospace;
}

/* ═══════════════════════════════════════
   COMMUNITY PAGE
═══════════════════════════════════════ */
.community-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;padding:22px}
.comm-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg);margin-bottom:16px}
.comm-tab{flex:1;padding:13px 24px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;color:var(--text-3);border:none;background:transparent;font-family:'DM Sans',sans-serif;white-space:nowrap}
.comm-tab.active{background:var(--text);color:var(--bg)}
.post-item{
  display:flex;gap:12px;padding:14px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface);margin-bottom:10px;cursor:pointer;transition:all .15s;
}
.post-item:hover{border-color:var(--border-strong);box-shadow:var(--shadow)}
.post-sport-av{
  width:38px;height:38px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;
}
.post-title{font-size:13.5px;font-weight:600;margin-bottom:4px;line-height:1.35}
.post-meta{font-size:11.5px;color:var(--text-3);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.post-excerpt{font-size:12.5px;color:var(--text-2);line-height:1.6}
.post-footer{display:flex;gap:12px;margin-top:8px;font-size:11.5px;color:var(--text-3)}
.post-stat{display:flex;align-items:center;gap:4px}

/* ═══════════════════════════════════════
   RANKING PAGE
═══════════════════════════════════════ */
.ranking-layout{display:grid;grid-template-columns:1fr 270px;flex:1;min-height:0}
.ranking-main{overflow-y:auto;padding:24px}
.ranking-sidebar{border-left:1px solid var(--border);padding:22px;overflow-y:auto}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:0;margin-bottom:24px;padding:0 12px}
.podium-item{display:flex;flex-direction:column;align-items:center;flex:1}
.podium-av{
  width:44px;height:44px;border-radius:50%;
  background:var(--bg);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;font-family:'DM Mono',monospace;margin-bottom:6px;
}
.podium-item.p1 .podium-av{width:52px;height:52px;background:var(--text);color:var(--bg);border-color:var(--text);font-size:22px}
.podium-name{font-size:12px;font-weight:600;margin-bottom:3px;text-align:center}
.podium-pts{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-3);margin-bottom:0}
.podium-item.p1 .podium-pts{color:var(--text);font-weight:700}
.podium-block{
  width:100%;padding:8px 0;text-align:center;
  font-size:14px;font-weight:700;font-family:'DM Mono',monospace;
  border:1px solid var(--border);border-bottom:none;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;background:var(--bg);
}
.podium-item.p1 .podium-block{background:var(--text);color:var(--bg);border-color:var(--text);height:64px;display:flex;align-items:center;justify-content:center}
.podium-item.p2 .podium-block{height:48px;display:flex;align-items:center;justify-content:center}
.podium-item.p3 .podium-block{height:34px;display:flex;align-items:center;justify-content:center}
.rank-row{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-bottom:1px solid var(--border);transition:background .12s;cursor:pointer;
}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:var(--bg)}
.rank-row.me{background:var(--bg);border-left:2px solid var(--accent)}
.rank-num{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;min-width:22px;text-align:center;color:var(--text-3)}
.rank-num.gold{color:#B8860B}.rank-num.silver{color:#888}.rank-num.bronze{color:#966440}
.rank-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;border:1px solid var(--border)}
.rank-info-col{flex:1}
.rank-name{font-size:13px;font-weight:600;margin-bottom:2px}
.rank-meta{font-size:11px;color:var(--text-3);display:flex;gap:8px}
.rank-pts{font-family:'DM Mono',monospace;font-size:13.5px;font-weight:700}
.rank-change{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.rank-change.up{color:var(--green)}.rank-change.down{color:var(--red)}.rank-change.same{color:var(--text-3)}

/* ═══════════════════════════════════════
   MY PAGE
═══════════════════════════════════════ */
.mypage-layout{display:grid;grid-template-columns:280px 1fr;gap:18px;padding:22px;align-items:start}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.profile-banner{height:72px;background:linear-gradient(135deg,#0f1520,#1A5CFF,#00C8D4)}
.profile-av-wrap{padding:0 18px;margin-top:-30px;position:relative;z-index:1}
.profile-big-av{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#1A5CFF,#00C8D4);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;font-family:'DM Mono',monospace;
  border:3px solid var(--surface);
}
.profile-info{padding:10px 18px 16px}
.profile-name{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.profile-handle{font-size:11.5px;color:var(--text-3);font-family:'DM Mono',monospace;margin-bottom:8px}
.profile-badges{display:flex;gap:6px;flex-wrap:wrap}
.profile-badge{
  padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:600;
  background:var(--bg);border:1px solid var(--border);font-family:'DM Mono',monospace;
}
.profile-divider{height:1px;background:var(--border);margin:14px 18px}
.profile-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:0 14px 16px}
.ps-item{text-align:center;padding:8px}
.ps-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;display:block}
.ps-label{font-size:10.5px;color:var(--text-3);display:block;margin-top:1px}
.rank-info-box{
  background:var(--text);color:var(--bg);
  border-radius:var(--radius-sm);padding:16px 18px;margin:0 18px 16px;
}
.rank-big-num{font-family:'DM Mono',monospace;font-size:40px;font-weight:700;letter-spacing:-2px;line-height:1}
.rank-info-label{font-size:11px;opacity:.6;margin-bottom:2px}
.rank-info-sub{font-size:12px;margin-top:8px;opacity:.75}
.rank-accent{color:var(--accent)}
.mypage-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px 14px}
.mypage-nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .15s;
  border:none;background:none;text-align:left;
}
.mypage-nav-item:hover{background:var(--bg);color:var(--text)}
.mypage-nav-item.active{background:var(--bg);color:var(--text);font-weight:600}

.mypage-main{display:flex;flex-direction:column;gap:14px}
.mypage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.mypage-card-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.mypage-card-title{font-size:12.5px;font-weight:700}
.mypage-card-action{font-size:12px;color:var(--text-3);cursor:pointer;transition:color .15s}
.mypage-card-action:hover{color:var(--text)}
.mypage-card-body{padding:16px}
.history-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.hi-sport{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);flex-shrink:0}
.hi-info{flex:1}
.hi-title{font-size:12.5px;font-weight:600;margin-bottom:1px}
.hi-meta{font-size:11px;color:var(--text-3);display:flex;gap:8px}
.hi-result{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap}
.hi-result.win{color:var(--green)}.hi-result.draw{color:var(--text-3)}.hi-result.done{color:var(--primary)}
.sport-bar{margin-bottom:9px}
.sport-bar:last-child{margin-bottom:0}
.sport-bar-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sport-bar-label{font-size:12px;font-weight:500;flex:1}
.sport-bar-level{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-3)}
.sport-bar-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.sport-bar-fill{height:100%;background:var(--text);border-radius:2px;transition:width .6s ease}
.schedule-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.schedule-item:last-child{border-bottom:none}
.sched-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3);min-width:52px;flex-shrink:0}
.sched-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sched-info{flex:1}
.sched-title{font-size:12.5px;font-weight:600;margin-bottom:1px}
.sched-sub{font-size:11px;color:var(--text-3)}
.sched-status{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0}

/* ═══════════════════════════════════════
   CHAT PAGE
═══════════════════════════════════════ */
.chat-layout{display:grid;grid-template-columns:270px 1fr;flex:1;min-height:0}
.chat-rooms{border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}
.chat-rooms-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-rooms-title{font-size:13px;font-weight:700;color:var(--text)}
.chat-rooms-list{flex:1;overflow-y:auto}
.chat-room-item{display:flex;gap:10px;padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;align-items:flex-start}
.chat-room-item:hover{background:var(--bg)}
.chat-room-item.active{background:var(--bg);border-left:2px solid var(--accent)}
.cr-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.cr-info{flex:1;min-width:0}
.cr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.cr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-time{font-size:10.5px;color:var(--text-3);font-family:'DM Mono',monospace;flex-shrink:0}
.cr-preview{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-unread{
  min-width:18px;height:18px;border-radius:10px;
  background:var(--text);color:var(--bg);
  font-size:10px;font-weight:700;font-family:'DM Mono',monospace;
  display:flex;align-items:center;justify-content:center;
  padding:0 5px;flex-shrink:0;
}

.chat-area{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px}
.chat-hd-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);background:var(--bg)}
.chat-hd-name{font-size:14px;font-weight:700;margin-bottom:1px}
.chat-hd-meta{font-size:11.5px;color:var(--text-3)}
.chat-hd-actions{margin-left:auto;display:flex;gap:6px}
.chat-icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;font-size:14px;color:var(--text-2)}
.chat-icon-btn:hover{background:var(--bg);color:var(--text)}

.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.mine{justify-content:flex-end}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'DM Mono',monospace}
.msg-av.hidden{opacity:0;pointer-events:none}
.msg-content{display:flex;flex-direction:column;max-width:72%}
.msg-sender{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:3px;padding-left:2px}
.msg-bubble{
  padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.55;
}
.msg-bubble.theirs{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.msg-bubble.mine{background:var(--text);color:var(--bg);border-radius:14px 4px 14px 14px}
.msg-time{font-size:10px;color:var(--text-3);margin-top:3px;font-family:'DM Mono',monospace;padding:0 2px}
.msg-row.mine .msg-time{text-align:right}
.chat-date-divider{text-align:center;font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;padding:4px 0;letter-spacing:.5px}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.typing-dot{width:6px;height:6px;background:var(--text-3);border-radius:50%;animation:typingDot 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,80%,100%{transform:scale(0.8);opacity:.5}40%{transform:scale(1);opacity:1}}

.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end}
.chat-input{
  flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:13.5px;font-family:'DM Sans',sans-serif;resize:none;outline:none;
  background:var(--bg);transition:border-color .15s;
}
.chat-input:focus{border-color:var(--border-strong)}
.chat-send-btn{
  width:38px;height:38px;border-radius:var(--radius-sm);
  background:var(--text);color:var(--bg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .15s;flex-shrink:0;
}
.chat-send-btn:hover{background:#222}

/* ═══════════════════════════════════════
   FORM PAGES (CREATE)
═══════════════════════════════════════ */
.form-page{padding:28px;flex:1;overflow-y:auto}
.form-max{max-width:700px;margin:0 auto}
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px}
.form-section-title{font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-2);margin-bottom:16px}
.level-row{display:flex;gap:6px}
.lv-btn{flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-size:12.5px;font-weight:500;transition:all .15s;background:var(--surface);color:var(--text-2)}
.lv-btn:hover{border-color:var(--border-strong);color:var(--text)}
.lv-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.pos-tags{display:flex;flex-wrap:wrap;gap:5px}
.pos-tag{padding:5px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-2)}
.pos-tag:hover{border-color:var(--border-strong);color:var(--text)}
.pos-tag.on{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ═══════════════════════════════════════
   MODAL & POPUPS
═══════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);align-items:center;justify-content:center}

<script>
// ── AUTH STATE ──
let isLoggedIn = false;

// ── PAGE NAVIGATION ──
function goPage(p) {
  // 로그인이 필요한 페이지 접근 시 로그인 체크
  const authRequired = ['mypage', 'chat', 'notifications'];
  if (!isLoggedIn && authRequired.includes(p)) {
    openAuthModal('login');
    return;
  }
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const pg = document.getElementById('page-' + p);
  if (pg) { pg.classList.add('active'); }
  document.querySelector('.main').scrollTo(0, 0);
  // Update nav — data-page 속성 기반으로 정확히 매칭
  const pageGroup = { 'map-create':'map', 'regular-create':'regular', 'trade-sell':'trade' };
  const activeKey = pageGroup[p] || p;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === activeKey);
  });
  if (p === 'home') {
    const msgs = document.getElementById('chatMessages');
    if (msgs) setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 100);
  }
  // Leaflet 지도 초기화
  if (p === 'map') {
    setTimeout(() => {
      initLeafletMap();
      if (leafletMap) leafletMap.invalidateSize();
    }, 50);
  }
}

// ── FILTER FUNCTIONS ──
function toggleFilter(el) {
  document.querySelectorAll('.map-filter-chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}
function setSortTab(el) {
  el.closest('.map-sort-tabs').querySelectorAll('.map-sort-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}
function setFilter(el) {
  el.closest('.filter-section').querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}
function singleChip(el) {
  el.closest('.chip-group, .topbar-actions, .flex').querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}
function filterSport(el) {
  document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}
function singleLv(el) {
  el.closest('.level-row').querySelectorAll('.lv-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

// ── MAP POPUP ──
function showMapPopup(title, loc, time, members, sport, level, price) {
  document.getElementById('pp-sport').textContent = sport;
  document.getElementById('pp-title').textContent = title;
  document.getElementById('pp-loc').textContent = '📍 ' + loc;
  document.getElementById('pp-time').textContent = '⏰ ' + time;
  document.getElementById('pp-members').textContent = '👥 ' + members;
  document.getElementById('pp-level').textContent = level;
  document.getElementById('pp-price').textContent = price;
  document.getElementById('map-popup').classList.add('show');
}
function closeMapPopup() { document.getElementById('map-popup').classList.remove('show'); }

// ── MODAL ──
let _modalCb = null;
function showModal(title, msg, cb) {
  const emojiMatch = title.match(/^(\p{Emoji})/u);
  const emoji = emojiMatch ? emojiMatch[1] : '💡';
  const rest = title.replace(/^(\p{Emoji}\s*)/u, '');
  document.getElementById('modal-icon').textContent = emoji;
  document.getElementById('modal-title').textContent = rest;
  document.getElementById('modal-msg').innerHTML = msg;
  _modalCb = cb;
  const okBtn = document.getElementById('modal-ok');
  okBtn.onclick = cb ? () => { closeModal(); cb(); } : closeModal;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// ── AUTH MODALS ──
function openAuthModal(type) {
  document.getElementById('modal-' + type).classList.add('show');
}
function closeAuthModal(type) {
  document.getElementById('modal-' + type).classList.remove('show');
}
function switchAuthModal(from, to) {
  closeAuthModal(from);
  setTimeout(() => openAuthModal(to), 100);
}
function handleAuthSuccess(action) {
  const type = action === '로그인' ? 'login' : 'signup';
  closeAuthModal(type);
  isLoggedIn = true;
  setLoginState(true);
  showModal('🎉 ' + action + ' 완료!', action + '에 성공하였습니다.<br>SPORTMATCH의 모든 기능을 자유롭게 이용해보세요.', null);
}

function setLoginState(loggedIn) {
  // 모든 페이지 topbar의 auth-state-btns 전환
  document.querySelectorAll('.auth-state-btns[data-state="guest"]').forEach(el => {
    el.style.display = loggedIn ? 'none' : 'inline-flex';
  });
  document.querySelectorAll('.auth-state-btns[data-state="user"]').forEach(el => {
    el.style.display = loggedIn ? 'inline-flex' : 'none';
  });
  // 사이드바 하단 전환
  const navGuest = document.getElementById('nav-guest');
  const navUser  = document.getElementById('nav-user');
  if (navGuest) navGuest.style.display = loggedIn ? 'none' : 'flex';
  if (navUser)  navUser.style.display  = loggedIn ? 'block' : 'none';
}

function doLogout() {
  isLoggedIn = false;
  setLoginState(false);
  goPage('home');
  showModal('👋 로그아웃', '로그아웃 되었습니다.<br>다음에 또 만나요!', null);
}

// ── COMMUNITY TABS ──
document.querySelectorAll('.comm-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    // 같은 탭 그룹(부모 컨테이너) 안에서만 active 토글
    const group = this.closest('.comm-tabs');
    if (group) group.querySelectorAll('.comm-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});

// ── NOTIFICATIONS ──
function filterNotif(btn, type) {
  // 탭 active
  const group = btn.closest('.comm-tabs');
  if (group) group.querySelectorAll('.comm-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // 항목 필터
  document.querySelectorAll('#notif-list .notif-item').forEach(el => {
    el.style.display = (type === 'all' || el.dataset.type === type) ? '' : 'none';
  });
}

function markAllRead() {
  document.querySelectorAll('.notif-item.unread').forEach(el => {
    el.classList.remove('unread');
    const dot = el.querySelector('.notif-dot');
    if (dot) dot.remove();
  });
  const badge = document.getElementById('notif-badge');
  if (badge) badge.style.display = 'none';
}

// ── CHAT ──
const chatData = {
  futsal:    { name:'성수 풋살 나이트', icon:'⚽', meta:'멤버 12명 · 오늘 20:00 성수 실내풋살장' },

  running:   { name:'성동 나이트 러닝 크루', icon:'🏃', meta:'멤버 41명 · 평일 21:00 성수역 집합' },
  basketball:{ name:'뚝섬 농구 스크림', icon:'🏀', meta:'멤버 10명 · 주말 18:00 뚝섬한강공원' },
  training:  { name:'퍼포먼스 트레이닝', icon:'💪', meta:'멤버 16명 · 수요일 20:00 왕십리' }
};
const chatMsgs = {
  badminton:[
    {type:'date',text:'오늘'},
    {from:'주최자',color:'#16a34a',init:'주',text:'이번 주 목요일 코트 예약 완료됐어요! ✅',time:'11:20'},
    {from:'홍다인',color:'#7c3aed',init:'홍',text:'감사합니다 🙏 라켓 가져가야 하나요?',time:'11:25'},
    {from:'주최자',color:'#16a34a',init:'주',text:'네, 라켓은 개인 지참 부탁드려요. 셔틀콕은 제공됩니다!',time:'11:28'},
    {mine:true,text:'저도 참석할게요!',time:'11:45'}
  ],
  running:[
    {type:'date',text:'오늘'},
    {from:'박수아',color:'#f97316',init:'박',text:'오늘 비 올 것 같은데 진행하나요?',time:'17:10'},
    {from:'크루장',color:'#1A5CFF',init:'크',text:'소나기 예보라 8시 이후엔 괜찮을 것 같아요!',time:'17:22'},
    {mine:true,text:'저는 갑니다 💪',time:'17:35'}
  ],
  basketball:[
    {type:'date',text:'어제'},

    {mine:true,text:'저 가능해요!',time:'20:12'},

  ],
  training:[
    {type:'date',text:'2일 전'},
    {from:'트레이너',color:'#f59e0b',init:'트',text:'이번 주 루틴 공유드립니다 📋\n코어 20분 → 민첩성 드릴 15분 → 쿨다운 10분',time:'10:00'},
    {mine:true,text:'감사합니다! 혼자 연습해 볼게요',time:'10:30'}
  ]
};
const chatReplies = {
  futsal:[{from:'김민준',color:'#7c3aed',init:'민',texts:['ㅋㅋ 맞아요!','그럼 이따 봬요 👋','저도 지금 출발해요']}],
  badminton:[{from:'주최자',color:'#16a34a',init:'주',texts:['넵 환영합니다! 🙌','혹시 실력은 어느 정도이신가요?']}],
  running:[{from:'박수아',color:'#f97316',init:'박',texts:['오 진짜요?? 저도 갈게요!','같이 달려요 🏃']}],
  basketball:[{from:'김슬',color:'#ef4444',init:'김',texts:['좋아요! 확정이에요 ✅']}],
  training:[{from:'트레이너',color:'#f59e0b',init:'트',texts:['화이팅입니다! 💪','궁금한 점 있으시면 언제든지!']}]
};
let currentRoom = 'futsal';

function openChatRoom(roomId, el) {
  currentRoom = roomId;
  document.querySelectorAll('.chat-room-item').forEach(r => r.classList.remove('active'));
  if (el) el.classList.add('active');
  const unread = el ? el.querySelector('.cr-unread') : null;
  if (unread) unread.remove();
  const room = chatData[roomId];
  if (!room) return;
  document.getElementById('chatRoomIcon').textContent = room.icon;
  document.getElementById('chatRoomName').textContent = room.name;
  document.getElementById('chatRoomMeta').textContent = room.meta;
  document.querySelector('.chat-icon-btn[title="모임 정보"]').onclick = () =>
    showModal(room.icon+' '+room.name, room.meta.replace(/·/g,'<br>'));

  if (roomId === 'futsal') {
    setTimeout(() => { document.getElementById('chatMessages').scrollTop = 99999; }, 50);
    return;
  }
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '';
  let lastFrom = null;
  (chatMsgs[roomId] || []).forEach(m => {
    if (m.type === 'date') {
      msgs.innerHTML += `<div class="chat-date-divider">${m.text}</div>`;
      lastFrom = null; return;
    }
    if (m.mine) {
      msgs.innerHTML += `<div class="msg-row mine"><div class="msg-content"><div class="msg-bubble mine">${m.text.replace(/\n/g,'<br>')}</div><div class="msg-time">${m.time}</div></div></div>`;
      lastFrom = 'mine';
    } else {
      const showAv = lastFrom !== m.from;
      msgs.innerHTML += `<div class="msg-row"><div class="msg-av ${showAv?'':'hidden'}" style="background:linear-gradient(135deg,${m.color},${m.color}bb)">${m.init}</div><div class="msg-content">${showAv?`<div class="msg-sender">${m.from}</div>`:''}<div class="msg-bubble theirs">${m.text.replace(/\n/g,'<br>')}</div><div class="msg-time">${m.time}</div></div></div>`;
      lastFrom = m.from;
    }
  });
  msgs.innerHTML += `<div id="typingRow" class="msg-row" style="display:none"><div class="msg-av" style="background:var(--border)">?</div><div class="msg-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  setTimeout(() => { msgs.scrollTop = 99999; }, 50);
}

function sendChatMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const msgs = document.getElementById('chatMessages');
  const typingRow = document.getElementById('typingRow');
  const now = new Date();
  const t = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  const myMsg = document.createElement('div');
  myMsg.className = 'msg-row mine';
  myMsg.innerHTML = `<div class="msg-content"><div class="msg-bubble mine">${text}</div><div class="msg-time">${t}</div></div>`;
  msgs.insertBefore(myMsg, typingRow);
  msgs.scrollTop = 99999;
  setTimeout(() => { if (typingRow) typingRow.style.display = 'flex'; msgs.scrollTop = 99999; }, 600);
  const pool = chatReplies[currentRoom] || chatReplies.futsal;
  const replySet = pool[Math.floor(Math.random() * pool.length)];
  const replyText = replySet.texts[Math.floor(Math.random() * replySet.texts.length)];
  setTimeout(() => {
    if (typingRow) typingRow.style.display = 'none';
    const rMsg = document.createElement('div');
    rMsg.className = 'msg-row';
    rMsg.innerHTML = `<div class="msg-av" style="background:linear-gradient(135deg,${replySet.color},${replySet.color}bb)">${replySet.init}</div><div class="msg-content"><div class="msg-sender">${replySet.from}</div><div class="msg-bubble theirs">${replyText}</div><div class="msg-time">${t}</div></div>`;
    msgs.insertBefore(rMsg, typingRow);
    msgs.scrollTop = 99999;
  }, 1800);
}

let leafletMap = null;

function makeLeafletIcon(emoji, color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="52" viewBox="0 0 44 52">
    <path d="M22 0C10 0 1 9 1 21c0 16 21 31 21 31s21-15 21-31C43 9 34 0 22 0z" fill="${color}" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
    <text x="22" y="27" text-anchor="middle" dominant-baseline="middle" font-size="18">${emoji}</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [44, 52],
    iconAnchor: [22, 52],
    popupAnchor: [0, -54],
    className: ''
  });
}

function initLeafletMap() {
  if (leafletMap) return;

  leafletMap = L.map('leaflet-map', { zoomControl: false }).setView([37.5350, 127.0050], 13);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(leafletMap);

  // 내 위치 마커 (성수동 기준)
  const myIcon = L.divIcon({
    html: `<div style="width:14px;height:14px;background:#C8FF00;border:2px solid #111;border-radius:50%;box-shadow:0 0 0 8px rgba(200,255,0,.25)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7], className: ''
  });
  L.marker([37.5447, 127.0461], { icon: myIcon }).addTo(leafletMap)
    .bindTooltip('📍 내 위치', { permanent: false });

  // 줌 컨트롤 (우측 상단)
  L.control.zoom({ position: 'topright' }).addTo(leafletMap);

  leafletMatches.forEach(m => {
    const marker = L.marker([m.lat, m.lng], { icon: makeLeafletIcon(m.emoji, m.color) })
      .addTo(leafletMap)
      .bindPopup(`
        <div style="font-family:'DM Sans',sans-serif;min-width:200px;padding:4px 0">
          <div style="font-size:15px;font-weight:700;margin-bottom:6px">${m.emoji} ${m.title}</div>
          <div style="font-size:12px;color:#666;margin-bottom:3px">📍 ${m.addr}</div>
          <div style="font-size:12px;color:#666;margin-bottom:3px">⏰ ${m.time}</div>
          <div style="font-size:12px;color:#666;margin-bottom:3px">👥 ${m.members} · ${m.level}</div>
          <div style="font-size:13px;font-weight:700;color:${m.color};margin-top:8px">💰 ${m.fee}</div>
          <button onclick="showMapPopup('${m.title}','${m.addr}','${m.time}','${m.members}','${m.emoji}','${m.level}','${m.fee}')"
            style="margin-top:10px;width:100%;padding:7px;background:#111;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer">
            참가 신청하기
          </button>
        </div>
      `, { maxWidth: 240 });
    marker._sportEmoji = m.emoji;
    leafletMarkers.push(marker);
  });
}

// ── COMMUNITY FILTERS ──
let currentCommCat = 'all';
let currentCommPeriod = 'daily';

const periodLabels = {
  daily: '📅 오늘의 인기글',
  weekly: '📅 이번 주 인기글',
  monthly: '📅 이번 달 인기글'
};

// Simulated like counts by period (multiplier for demo)
const periodMultiplier = { daily: 1, weekly: 5, monthly: 20 };

function filterCommTab(btn, cat) {
  document.querySelectorAll('.comm-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCommCat = cat;
  applyCommFilter();
}

function filterCommPeriod(btn, period) {
  document.querySelectorAll('.comm-period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCommPeriod = period;
  document.getElementById('comm-period-label').textContent = periodLabels[period];
  applyCommFilter();
}

function applyCommFilter() {
  const posts = document.querySelectorAll('#comm-posts .post-item');
  const mul = periodMultiplier[currentCommPeriod];

  // Filter by category
  posts.forEach(p => {
    const cat = p.dataset.cat;
    const show = currentCommCat === 'all' || cat === currentCommCat;
    p.style.display = show ? '' : 'none';
  });

  // Sort visible posts by likes * period multiplier
  const container = document.getElementById('comm-posts');
  const visible = [...posts].filter(p => p.style.display !== 'none');
  visible.sort((a, b) => {
    const la = parseInt(a.dataset.likes || 0) * mul;
    const lb = parseInt(b.dataset.likes || 0) * mul;
    return lb - la;
  });
  visible.forEach(p => container.appendChild(p));
}

// ── REGULAR MEETING FILTER ──
function regFilter(btn, type) {
  document.querySelectorAll('.reg-filter-chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.reg-card').forEach(card => {
    if (type === 'all') {
      card.style.display = '';
    } else {
      const f = card.dataset.filter || '';
      card.style.display = f.includes(type) ? '' : 'none';
    }
  });
}

function leafletFilterToggle(btn, type) {
  document.querySelectorAll('.map-filter-chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  leafletFilterActive = type;
  leafletMarkers.forEach((marker, i) => {
    const m = leafletMatches[i];
    if (type === 'all' || m.emoji === type) {
      if (!leafletMap.hasLayer(marker)) marker.addTo(leafletMap);
    } else {
      if (leafletMap.hasLayer(marker)) leafletMap.removeLayer(marker);
    }
  });
}
